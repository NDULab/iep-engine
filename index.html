const GLOSSARY = [
  { term: "IEP", full: "Individualized Education Program", def: "A legally binding document that spells out exactly what services, supports, goals, and accommodations the school must provide your child. It's not a suggestion — it's a contract." },
  { term: "504 Plan", full: "Section 504 Accommodation Plan", def: "A plan that gives your child accommodations (like extra time or preferential seating) but doesn't include specialized instruction or measurable goals. Less protection than an IEP, but easier to get." },
  { term: "IDEA", full: "Individuals with Disabilities Education Act", def: "The federal law that guarantees your child's right to a free, appropriate public education with the supports they need. This is where all IEP rights come from." },
  { term: "FAPE", full: "Free Appropriate Public Education", def: "Your child's legal right to an education that actually works for them — not just a desk in a room, but meaningful access and progress. 'Appropriate' is the word schools fight over most." },
  { term: "LRE", full: "Least Restrictive Environment", def: "The law says your child should be educated alongside non-disabled peers to the maximum extent appropriate, with supports. The school has to try supports in general education before pulling your child out." },
  { term: "PWN", full: "Prior Written Notice", def: "When the school says no to something you asked for (or changes something without you asking), they have to tell you in writing: what they refused, why, and what data they used. If they won't put it in writing, ask. This is your paper trail." },
  { term: "FBA", full: "Functional Behavior Assessment", def: "An assessment that figures out WHY your child is doing a behavior — what triggers it, what need it meets. The school can't just say 'it's a behavior problem' without understanding the function." },
  { term: "BIP", full: "Behavior Intervention Plan", def: "A plan that addresses the 'why' from the FBA with specific strategies, replacement behaviors, and supports. It should prevent problems, not just punish them." },
  { term: "IEE", full: "Independent Educational Evaluation", def: "If you disagree with the school's evaluation, you can request an outside evaluation at the district's expense. The school has to either pay for it or file to prove their evaluation was adequate." },
  { term: "Manifestation Determination", full: "Manifestation Determination Review (MDR)", def: "When your child faces serious discipline (10+ days suspension), the team must decide: was the behavior caused by or related to their disability? If yes, the school can't just suspend them — they have to address the underlying need." },
  { term: "Eligibility", full: "Special Education Eligibility", def: "The process of deciding whether your child qualifies for special education services. A diagnosis alone doesn't guarantee eligibility — the school looks at whether the disability impacts educational performance." },
  { term: "Present Levels", full: "Present Levels of Performance (PLOP)", def: "The section of the IEP that describes where your child is RIGHT NOW — what they can do, what they struggle with, and how the disability impacts school. Everything else in the IEP should flow from this." },
  { term: "Related Services", full: "Related Services", def: "Extra supports your child needs to benefit from their education: speech therapy, occupational therapy, counseling, transportation, assistive technology. These are part of FAPE if the team determines need." },
  { term: "Accommodations", full: "Accommodations vs. Modifications", def: "Accommodations change HOW your child learns (extra time, quiet space, audiobooks). Modifications change WHAT they learn (simplified content, fewer problems). Both can be in an IEP." },
  { term: "RTI / MTSS", full: "Response to Intervention / Multi-Tiered System of Supports", def: "A framework schools use to provide increasing levels of support. Important: the school CANNOT use RTI to delay an evaluation if you've made a written request." },
  { term: "Consent", full: "Parental Consent", def: "The school needs your written permission before they evaluate your child or start services. You can give consent for evaluation without agreeing to whatever they find. You can also revoke consent for services." },
  { term: "Stay-Put", full: "Stay-Put / Pendency", def: "If you formally dispute a change to your child's placement or services, the child stays in their current placement until the dispute is resolved. This is a powerful protection against sudden changes." },
  { term: "Due Process", full: "Due Process Hearing", def: "A formal legal proceeding — like a trial — where a hearing officer decides a dispute between you and the school. It's the most serious step, but knowing it exists gives your other requests weight." },
  { term: "Mediation", full: "Mediation", def: "A voluntary meeting with a neutral mediator to try to resolve disputes before due process. It's less adversarial, less expensive, and often effective. Both sides have to agree to it." },
  { term: "State Complaint", full: "State Complaint", def: "A written complaint to your state department of education alleging the school violated IDEA. The state must investigate and respond within 60 days. This is free and you don't need a lawyer." },
];

function computeModule1(data) {
  const scores = {}; Object.keys(DOMAIN_LABELS).forEach(k => scores[k] = 0);
  data.suspectedNeeds.forEach(n => { const m = NEED_DOMAIN_MAP[n]; if (m) Object.entries(m).forEach(([k,v]) => scores[k] += v); });
  data.diagnosis.forEach(d => { const m = DX_DOMAIN_MAP[d]; if (m) Object.entries(m).forEach(([k,v]) => scores[k] += v); });
  const ranked = Object.entries(scores).filter(([,v]) => v > 0).sort((a,b) => b[1] - a[1]);
  const topDomains = ranked.slice(0, 3).map(([code, score]) => ({ code, label: DOMAIN_LABELS[code], score }));
  const redFlags = RED_FLAG_RULES.filter(r => r.check(data));
  let checklist = [...UNIVERSAL_CHECKLIST];
  topDomains.forEach(d => { if (DOMAIN_CHECKLIST[d.code]) checklist.push(...DOMAIN_CHECKLIST[d.code]); });
  let questions = [...UNIVERSAL_QUESTIONS];
  topDomains.forEach(d => { if (DOMAIN_QUESTIONS[d.code]) questions.push(...DOMAIN_QUESTIONS[d.code]); });
  if (MEETING_TYPE_QUESTIONS[data.meetingType]) questions.push(...MEETING_TYPE_QUESTIONS[data.meetingType]);
  return { topDomains, allScores: ranked, redFlags, checklist, questions: questions.slice(0, 12) };
}

function computeModule2(mod1Data, evalData) {
  const coverageGaps = [];
  mod1Data.suspectedNeeds.forEach(need => {
    const m = COVERAGE_MAP[need];
    if (m && !evalData.domainsAssessed.includes(m.domain) && !coverageGaps.find(g => g.tag === m.tag))
      coverageGaps.push({ tag: m.tag, text: `${m.domain} not assessed despite suspected ${need.toLowerCase()} needs.` });
  });
  if (mod1Data.diagnosis.includes("Autism")) {
    if (!evalData.domainsAssessed.includes("Autism Rating Scales") && !coverageGaps.find(g => g.tag === "Autism_Scales_Check"))
      coverageGaps.push({ tag: "Autism_Scales_Check", text: "Autism-specific rating scales not used despite autism diagnosis." });
  }
  const coverageLevel = coverageGaps.length === 0 ? "Low" : coverageGaps.length === 1 ? "Moderate" : "High";
  let intS = 0; const intF = [];
  if (!evalData.standardizedScores) { intS += 2; intF.push({ tag: "Scores_Missing", text: "Scores/percentiles missing.", severity: "High" }); }
  if (!evalData.functionalImpact) { intS += 2; intF.push({ tag: "Impact_Omission", text: "Functional classroom impact not documented.", severity: "High" }); }
  if (!evalData.parentInput) { intS += 1; intF.push({ tag: "Parent_Input_Required", text: "Parent input missing.", severity: "High" }); }
  if (!evalData.teacherRatings) { intS += 1; intF.push({ tag: "Teacher_Data_Depth", text: "Teacher ratings missing.", severity: "Medium" }); }
  if (!evalData.observationConducted) { intS += 1; intF.push({ tag: "Observation_Required", text: "No classroom observation.", severity: "Medium" }); }
  if (evalData.observationConducted && !evalData.multipleSettings) { intS += 1; intF.push({ tag: "Multi_Setting", text: "Single setting observation.", severity: "Medium" }); }
  const intStatus = intS === 0 ? "PASS" : intS <= 2 ? "WEAK" : "RED FLAG";
  let minS = 0; const minF = [];
  if (evalData.withinAverageUsed && evalData.parentAlignment !== "Yes") { minS += 2; minF.push({ tag: "Average_Not_Enough", text: "'Within average' minimizing functional impact.", severity: "High" }); minF.push({ tag: "Masking_Risk", text: "Masking/compensatory effort not addressed.", severity: "High" }); }
  if (evalData.strengthsDismissal) { minS += 2; minF.push({ tag: "Strength_Dismissal", text: "Strengths used to deny support.", severity: "High" }); }
  if (evalData.behaviorMotivation) { minS += 2; minF.push({ tag: "Attribution_Risk", text: "Behavior framed as motivation without ruling out disability.", severity: "High" }); }
  if (evalData.doesNotQualify && evalData.parentAlignment !== "Yes") { minS += 2; minF.push({ tag: "Does_Not_Qualify_Logic", text: "Eligibility denial without alignment to functioning.", severity: "High" }); }
  const minLevel = minS === 0 ? "Low" : minS <= 2 ? "Moderate" : "High";
  const tags = new Set(); coverageGaps.forEach(g => tags.add(g.tag)); intF.forEach(f => tags.add(f.tag)); minF.forEach(f => tags.add(f.tag));
  const selQ = EVAL_QUESTIONS.filter(eq => tags.has(eq.tag)).sort((a,b) => ({ High: 0, Medium: 1, Low: 2 }[a.severity] || 2) - ({ High: 0, Medium: 1, Low: 2 }[b.severity] || 2));
  return { coverageGaps, coverageLevel, integrityFlags: intF, integrityScore: intS, integrityStatus: intStatus, minimizationFlags: minF, minimizationScore: minS, minimizationLevel: minLevel, questions: selQ.slice(0, 15) };
}

function computeModule3(mod1Data, mod2Results, mod3Data) {
  const disputes = mod3Data.disputes;
  const tone = mod3Data.tone;
  const matchedTriggers = LEVERAGE_TRIGGERS.filter(t => {
    const tagMatch = t.tags.some(tag => disputes.includes(tag));
    const mtMatch = t.meetingTypes.length === 0 || t.meetingTypes.includes(mod1Data.meetingType);
    return tagMatch && mtMatch;
  }).sort((a, b) => b.score - a.score).slice(0, 6);
  const rightIds = new Set(); matchedTriggers.forEach(t => t.rights.forEach(r => rightIds.add(r)));
  const rights = RIGHTS_LIBRARY.filter(r => rightIds.has(r.id));
  const scripts = SCRIPT_BANK[tone] || SCRIPT_BANK["Neutral-Structured"];
  const escOrder = ["None","Document","PWN","IEE","Complaint","Mediation-Due Process"];
  let maxEsc = "None";
  matchedTriggers.forEach(t => { if (escOrder.indexOf(t.escalation) > escOrder.indexOf(maxEsc)) maxEsc = t.escalation; });
  const pushbacks = PUSHBACK_SCRIPTS;
  return { matchedTriggers, rights, scripts, pushbacks, escalationPath: maxEsc, tone };
}

            <button onClick={() => setGlossaryOpen(true)} style={{ background: P.accentLight, border: `1px solid ${P.accent}`, color: P.accent, padding: "6px 14px", borderRadius: "6px", fontSize: "12px", fontWeight: 600, fontFamily: FONT, cursor: "pointer" }}>Open Full Glossary</button>
          </div>
          <div style={{ fontSize: "13px", color: P.textMuted, lineHeight: 1.6, marginBottom: "10px" }}>IEP meetings are full of acronyms designed to make you feel like you don't belong. You do belong.</div>
          <div style={{ display: "grid", gap: "6px" }}>
            {GLOSSARY.slice(0, 5).map(g => (
              <div key={g.term} style={{ display: "flex", gap: "8px", fontSize: "13px", lineHeight: 1.4 }}>
                <span style={{ fontWeight: 700, color: P.accent, minWidth: "42px" }}>{g.term}</span>
                <span style={{ color: P.text }}>{g.def.split(".")[0]}.</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{ textAlign: "center", marginBottom: "16px" }}><Btn primary onClick={() => go(1)}>Begin: Child Snapshot &rarr;</Btn></div>
        <div style={{ textAlign: "center", fontSize: "12px", color: P.textMuted, lineHeight: 1.5, marginBottom: "32px" }}>Takes 10-15 minutes total. You can print results at every stage.<br/>Your data stays in your browser and is never stored or shared.</div>
        <div style={{ background: P.surface, border: `1px solid ${P.border}`, borderRadius: "12px", padding: "20px 22px", marginBottom: "16px" }}>
          <div style={{ fontSize: "13px", fontWeight: 700, color: P.accent, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "10px" }}>About Neurodivergent Uprising</div>
          <p style={{ fontSize: "14px", color: P.text, lineHeight: 1.7, margin: "0 0 12px" }}>Neurodivergent Uprising builds tools for families navigating systems that weren't designed for their kids. We're parents, advocates, and neurodivergent humans ourselves.</p>
          <p style={{ fontSize: "14px", color: P.text, lineHeight: 1.7, margin: "0 0 16px" }}>This tool will get you far. But if your situation gets complicated, we offer 1:1 consults to help you strategize, prep, and hold your ground.</p>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "10px", alignItems: "center" }}>
            <a href="https://neurodivergentuprising.com" target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", padding: "10px 24px", borderRadius: "8px", background: P.accent, color: "#fff", fontSize: "13px", fontWeight: 700, fontFamily: FONT, textDecoration: "none" }}>Visit neurodivergentuprising.com</a>
            <a href="https://calendly.com/iepspeakup/45" target="_blank" rel="noopener noreferrer" style={{ fontSize: "13px", color: P.accent, fontWeight: 600, fontFamily: FONT, textDecoration: "underline" }}>Book a Consult</a>
          </div>
        </div>
        <Footer />
      </Wrap>
    </div>
  );

  // ---- Step 1: Module 1 Intake ----
  if (step === 1) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <AppHeader title="Module 1: Child & Case Snapshot" subtitle="Tell us about your child to generate your advocacy roadmap." step={1} onGlossary={() => setGlossaryOpen(true)} />
      <Wrap>
        <SL n="1" title="Child Basics" />
        <Input label="Child's First Name" value={d1.childName} onChange={v=>u1("childName",v)} placeholder="First name" />
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px" }}>
          <Input label="Age" value={d1.age} onChange={v=>u1("age",v)} placeholder="e.g. 9" />
          <Select label="Grade" value={d1.grade} onChange={v=>u1("grade",v)} options={["PK","K","1st","2nd","3rd","4th","5th","6th","7th","8th","9th","10th","11th","12th"]} />
        </div>
        <Select label="State" value={d1.state} onChange={v=>u1("state",v)} options={["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"]} />
        <SL n="2" title="Meeting Context" />
        <Select label="Meeting Type" value={d1.meetingType} onChange={v=>u1("meetingType",v)} options={["Initial evaluation","Eligibility","Annual IEP","Reevaluation","Manifestation","504 review","Other/Not sure"]} />
        <Input label="Next Meeting Date" value={d1.meetingDate} onChange={v=>u1("meetingDate",v)} placeholder="e.g. March 15, 2026" />
        <SL n="3" title="Known Context" sub="Select all that apply" />
        <label style={{ display:"block",fontSize:"13px",fontWeight:600,color:P.text,marginBottom:"8px" }}>Primary Diagnosis</label>
        <ChipSelect options={["ADHD","Autism","Dyslexia","Dysgraphia","Dyscalculia","Anxiety","Language Disorder","Trauma","ODD","Other","Not sure / None yet"]} selected={d1.diagnosis} onChange={v=>u1("diagnosis",v)} columns={3} />
        <div style={{height:"16px"}} />
        <label style={{ display:"block",fontSize:"13px",fontWeight:600,color:P.text,marginBottom:"8px" }}>Suspected Areas of Need</label>
        <ChipSelect options={["Reading","Writing","Math","Attention/Impulsivity","Emotional Regulation","Behavior","Social Communication","Executive Function","Sensory","Speech/Language","Motor/OT","Attendance/Avoidance"]} selected={d1.suspectedNeeds} onChange={v=>u1("suspectedNeeds",v)} columns={3} />
        <div style={{height:"16px"}} />
        <label style={{ display:"block",fontSize:"13px",fontWeight:600,color:P.text,marginBottom:"8px" }}>Current Services</label>
        <ChipSelect options={["IEP","504","RTI/MTSS","Speech","OT","Counseling","Behavior plan/BIP","Tutoring","None/Unknown"]} selected={d1.currentServices} onChange={v=>u1("currentServices",v)} columns={3} />
        <SL n="4" title="Your Top Concerns" sub="In your own words" />
        <Input label="Concern 1 (most important)" value={d1.concern1} onChange={v=>u1("concern1",v)} placeholder="e.g. Meltdowns during transitions" />
        <Input label="Concern 2" value={d1.concern2} onChange={v=>u1("concern2",v)} placeholder="e.g. Homework takes hours" />
        <Input label="Concern 3" value={d1.concern3} onChange={v=>u1("concern3",v)} placeholder="e.g. Refuses writing tasks" />
        <SL n="5" title="Urgent Concerns" sub="Select any that apply" />
        <ChipSelect options={["Suspension/Restraint","Seclusion","Calls home","Refusal/School avoidance","Threats of self-harm","Bullying","Police/SRO involvement","None"]} selected={d1.urgentMarkers} onChange={v=>u1("urgentMarkers",v)} columns={2} />
        <div style={{ marginTop:"36px",textAlign:"center" }}><Btn primary disabled={!can1} onClick={() => { setR1(computeModule1(d1)); go(2); }}>Generate Snapshot &rarr;</Btn></div>
        <Footer />
      </Wrap>
    </div>
  );

  // ---- Step 2: Module 1 Results ----
  if (step === 2 && r1) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <AppHeader title={`Snapshot: ${d1.childName}`} subtitle={[d1.grade && `Grade ${d1.grade}`, d1.meetingType, d1.meetingDate].filter(Boolean).join(" · ")} step={2} onGlossary={() => setGlossaryOpen(true)} />
      <Wrap>
        <div style={{ display:"flex",gap:"10px",justifyContent:"center",margin:"16px 0" }}><Btn onClick={()=>go(1)}>&larr; Edit</Btn><Btn onClick={()=>window.print()}>Print</Btn></div>
        <H2>Priority Domains</H2>
        {r1.topDomains.map((d,i) => <Card key={d.code} bg={i===0?P.accentLight:P.surface} border={i===0?P.accent:P.border}><div style={{display:"flex",alignItems:"center",gap:"12px"}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:"30px",height:"30px",borderRadius:"50%",background:i===0?P.accent:P.border,color:i===0?"#fff":P.text,fontSize:"13px",fontWeight:700}}>#{i+1}</span><div><strong>{d.label}</strong> <span style={{color:P.textMuted,fontSize:"12px"}}>Score: {d.score}</span></div></div></Card>)}
        <H2 color={P.accentWarm}>Red Flags</H2>
        {r1.redFlags.length===0 ? <Card bg={P.successLight} border="#A7F3D0"><strong style={{color:P.success}}>No red flags detected.</strong> Stay data-anchored.</Card> :
          r1.redFlags.map(f => <Card key={f.id} bg={f.severity==="High"?P.highBg:P.mediumBg} border={f.severity==="High"?"#FECACA":"#FDE68A"}><span style={{fontSize:"11px",fontWeight:700,color:f.severity==="High"?P.high:P.medium,textTransform:"uppercase"}}>{f.severity}</span> <strong>{f.title}</strong><br/>{f.card}</Card>)}
        <H2>Pre-Meeting Checklist</H2>
        <div style={{background:P.surface,borderRadius:"10px",border:`1px solid ${P.border}`}}>{r1.checklist.map((item,i) => <div key={i} style={{display:"flex",gap:"10px",padding:"10px 14px",borderBottom:i<r1.checklist.length-1?`1px solid ${P.border}`:"none",fontSize:"13px",lineHeight:1.45}}><span style={{width:"16px",height:"16px",minWidth:"16px",borderRadius:"3px",border:`1.5px solid ${P.border}`,marginTop:"2px"}} />{item}</div>)}</div>
        <H2>Questions to Bring</H2>
        <div style={{background:P.surface,borderRadius:"10px",border:`1px solid ${P.border}`}}>{r1.questions.map((q,i) => <div key={i} style={{display:"flex",gap:"10px",padding:"11px 14px",borderBottom:i<r1.questions.length-1?`1px solid ${P.border}`:"none",fontSize:"13px",lineHeight:1.45}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:"22px",height:"22px",borderRadius:"50%",background:P.accentLight,color:P.accent,fontSize:"11px",fontWeight:700}}>{i+1}</span><em>{q}</em></div>)}</div>
        <div style={{marginTop:"32px",textAlign:"center"}}><Btn primary onClick={()=>go(3)}>Continue to Module 2: Evaluation Clarifier &rarr;</Btn></div>
        <Footer />
      </Wrap>
    </div>
  );

  // ---- Step 3: Module 2 Intake ----
  if (step === 3) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <AppHeader title="Module 2: Evaluation Clarifier" subtitle={`Stress-test ${d1.childName}'s evaluation for gaps and risk.`} step={3} onGlossary={() => setGlossaryOpen(true)} />
      <Wrap>
        <Card bg={P.accentLight} border={P.accent}><strong>From Module 1:</strong> Suspected areas: {d1.suspectedNeeds.slice(0,4).join(", ")}{d1.diagnosis.length>0 && d1.diagnosis[0]!=="Not sure / None yet" ? `. Dx: ${d1.diagnosis.join(", ")}` : ""}</Card>
        <SL n="1" title="Evaluation Type" />
        <Select label="Type" value={d2.evalType} onChange={v=>u2("evalType",v)} options={["Initial","Reevaluation","IEE (Independent)"]} />
        <SL n="2" title="Domains Assessed" sub="What was actually evaluated?" />
        <ChipSelect options={["Cognitive","Academic","Executive Function","Speech/Language","Occupational Therapy","Social/Emotional","Behavior","Autism Rating Scales","Adaptive Functioning"]} selected={d2.domainsAssessed} onChange={v=>u2("domainsAssessed",v)} columns={2} />
        <SL n="3" title="Data Quality" sub="Check what was included in the report" />
        <div style={{background:P.surface,borderRadius:"10px",border:`1px solid ${P.border}`,padding:"4px 16px"}}>
          <Checkbox label="Standardized scores provided" checked={d2.standardizedScores} onChange={v=>u2("standardizedScores",v)} />
          <Checkbox label="Percentiles provided" checked={d2.percentiles} onChange={v=>u2("percentiles",v)} />
          <Checkbox label="Narrative summary included" checked={d2.narrativeSummary} onChange={v=>u2("narrativeSummary",v)} />
          <Checkbox label="Functional classroom impact described" checked={d2.functionalImpact} onChange={v=>u2("functionalImpact",v)} />
          <Checkbox label="Parent input included" checked={d2.parentInput} onChange={v=>u2("parentInput",v)} />
          <Checkbox label="Teacher ratings included" checked={d2.teacherRatings} onChange={v=>u2("teacherRatings",v)} />
          <Checkbox label="Classroom observation conducted" checked={d2.observationConducted} onChange={v=>u2("observationConducted",v)} />
          <Checkbox label="Multiple settings observed" checked={d2.multipleSettings} onChange={v=>u2("multipleSettings",v)} />
        </div>
        <SL n="4" title="Dismissal Indicators" sub="Did you see these patterns?" />
        <div style={{background:P.surface,borderRadius:"10px",border:`1px solid ${P.border}`,padding:"4px 16px"}}>
          <Checkbox label="'Within average range' used to justify no support" checked={d2.withinAverageUsed} onChange={v=>u2("withinAverageUsed",v)} />
          <Checkbox label="Strengths used to deny support" checked={d2.strengthsDismissal} onChange={v=>u2("strengthsDismissal",v)} />
          <Checkbox label="'Does not qualify' language used" checked={d2.doesNotQualify} onChange={v=>u2("doesNotQualify",v)} />
          <Checkbox label="Behavior attributed to motivation" checked={d2.behaviorMotivation} onChange={v=>u2("behaviorMotivation",v)} />
          <Checkbox label="No recommendations made" checked={d2.noRecommendations} onChange={v=>u2("noRecommendations",v)} />
        </div>
        <SL n="5" title="Alignment Check" />
        <Select label="Does this report reflect your child's daily reality?" value={d2.parentAlignment} onChange={v=>u2("parentAlignment",v)} options={["Yes","Partially","No"]} />
        <div style={{marginTop:"36px",textAlign:"center"}}><Btn warm disabled={!can2} onClick={()=>{setR2(computeModule2(d1,d2));go(4);}}>Run Evaluation Stress Test &rarr;</Btn></div>
        <Footer />
      </Wrap>
    </div>
  );

  // ---- Step 4: Module 2 Results ----
  // ── CHANGE 1: Continue button now routes to go(8) [email gate] instead of go(5) ──
  if (step === 4 && r2) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <AppHeader title={`Eval Stress Test: ${d1.childName}`} step={4} onGlossary={() => setGlossaryOpen(true)} />
      <Wrap>
        <div style={{display:"flex",gap:"10px",justifyContent:"center",margin:"16px 0"}}><Btn onClick={()=>go(3)}>&larr; Edit</Btn><Btn onClick={()=>window.print()}>Print</Btn></div>
        <H2>Stress Test Summary</H2>
        <div style={{display:"flex",flexWrap:"wrap",gap:"10px",marginBottom:"20px"}}><Badge label="Integrity" level={r2.integrityStatus} /><Badge label="Minimization" level={r2.minimizationLevel} /><Badge label="Coverage" level={r2.coverageLevel} /></div>
        {[...r2.coverageGaps.map(g=>({type:"COVERAGE",text:g.text,sev:"High"})),...r2.integrityFlags.map(f=>({type:"INTEGRITY",text:f.text,sev:f.severity})),...r2.minimizationFlags.map(f=>({type:"MINIMIZATION",text:f.text,sev:f.severity}))].map((f,i) =>
          <Card key={i} bg={f.sev==="High"?P.highBg:P.mediumBg} border={f.sev==="High"?"#FECACA":"#FDE68A"}><span style={{fontSize:"11px",fontWeight:700,color:f.sev==="High"?P.high:P.medium,textTransform:"uppercase"}}>{f.type} </span>{f.text}</Card>
        )}
        {r2.coverageGaps.length===0&&r2.integrityFlags.length===0&&r2.minimizationFlags.length===0 && <Card bg={P.successLight} border="#A7F3D0"><strong style={{color:P.success}}>No significant flags.</strong> Evaluation appears methodologically sound.</Card>}
        {r2.questions.length > 0 && <><H2>Strategic Questions</H2>
          <div style={{background:P.surface,borderRadius:"10px",border:`1px solid ${P.border}`}}>{r2.questions.map((q,i) => <div key={i} style={{display:"flex",gap:"10px",padding:"11px 14px",borderBottom:i<r2.questions.length-1?`1px solid ${P.border}`:"none",fontSize:"13px",lineHeight:1.45}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:"20px",height:"20px",borderRadius:"50%",background:q.engine==="Coverage"?P.highBg:q.engine==="Minimization"?P.mediumBg:P.accentLight,color:q.engine==="Coverage"?P.high:q.engine==="Minimization"?P.medium:P.accent,fontSize:"10px",fontWeight:700}}>{q.engine[0]}</span><em>{q.q}</em></div>)}</div>
        </>}
        {/* ── CHANGE 1: was go(5), now routes to email gate go(8) ── */}
        <div style={{marginTop:"32px",textAlign:"center"}}><Btn primary onClick={()=>go(8)}>Unlock Module 3: Rights & Strategy &rarr;</Btn></div>
        <Footer />
      </Wrap>
    </div>
  );

  // ---- Step 5: Module 3 Intake ----
  if (step === 5) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <AppHeader title="Module 3: Rights & Leverage" subtitle="Build your calibrated meeting strategy." step={5} onGlossary={() => setGlossaryOpen(true)} />
      <Wrap>
        <SL n="1" title="What's In Dispute?" sub="Select all areas of conflict or concern for this meeting" />
        <ChipSelect options={["Eval denied","Eligibility","Services intensity","Goals-baselines","Implementation failure","Placement","Behavior discipline","Timeline"]} selected={d3.disputes} onChange={v=>u3("disputes",v)} columns={2} />
        <SL n="2" title="Your Preferred Tone" sub="How do you want to approach this meeting?" />
        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
          {["Collaborative","Neutral-Structured","Firm"].map(t => (
            <button key={t} onClick={()=>u3("tone",t)} style={{padding:"14px 16px",borderRadius:"10px",border:`1.5px solid ${d3.tone===t?P.accent:P.border}`,background:d3.tone===t?P.accentLight:P.surface,textAlign:"left",cursor:"pointer",fontFamily:FONT}}>
              <div style={{fontWeight:700,fontSize:"14px",color:d3.tone===t?P.accent:P.text}}>{t}</div>
              <div style={{fontSize:"12px",color:P.textMuted,marginTop:"2px"}}>{t==="Collaborative"?"Partnership-first. Data-anchored but warm.":t==="Neutral-Structured"?"Clear, procedural, fact-based. No emotion.":"Direct. Rights-anchored. Sets boundaries."}</div>
            </button>
          ))}
        </div>
        <SL n="3" title="Meeting Goals" sub="What do you need to walk out with?" />
        <Input label="Primary Goal" value={d3.goal1} onChange={v=>u3("goal1",v)} placeholder="e.g. Secure comprehensive EF evaluation" />
        <Input label="Secondary Goal" value={d3.goal2} onChange={v=>u3("goal2",v)} placeholder="e.g. Increase direct instruction minutes" />
        <Input label="Non-Negotiable" value={d3.goal3} onChange={v=>u3("goal3",v)} placeholder="e.g. Written data for all denied services" />
        <div style={{marginTop:"36px",textAlign:"center"}}><Btn primary disabled={!can3} onClick={()=>{setR3(computeModule3(d1,r2,d3));go(6);}}>Generate Strategy Brief &rarr;</Btn></div>
        <Footer />
      </Wrap>
    </div>
  );

  // ---- Step 6: Module 3 Results ----
  // ── CHANGE 2: "Generate Meeting Packet" button now goes directly to go(7) ──
  // Email was already captured at step 8 (the gate before Module 3).
  if (step === 6 && r3) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <AppHeader title={`Strategy Brief: ${d1.childName}`} step={6} onGlossary={() => setGlossaryOpen(true)} />
      <Wrap>
        <div style={{display:"flex",gap:"10px",justifyContent:"center",margin:"16px 0"}}><Btn onClick={()=>go(5)}>&larr; Edit</Btn><Btn onClick={()=>window.print()}>Print</Btn></div>
        <H2>Leverage Map</H2>
        <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"16px"}}><Badge label="Tone" level={r3.tone} /><Badge label="Escalation Path" level={r3.escalationPath} /></div>
        {r3.matchedTriggers.map(t => <Card key={t.id} bg={t.strength==="High"?P.warmLight:P.surface} border={t.strength==="High"?"#F5D0C5":P.border}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><strong>{t.name}</strong><span style={{fontSize:"11px",fontWeight:700,color:t.strength==="High"?P.accentWarm:P.textMuted,textTransform:"uppercase"}}>{t.strength} leverage</span></div></Card>)}
        {r3.matchedTriggers.length===0 && <Card bg={P.successLight} border="#A7F3D0"><strong style={{color:P.success}}>No high-leverage triggers matched.</strong></Card>}
        <H2>Your Rights in This Meeting</H2>
        {r3.rights.map(r => <Card key={r.id}><div style={{fontWeight:700,marginBottom:"4px"}}>{r.name} <span style={{fontSize:"11px",color:P.textMuted}}>({r.framework})</span></div><div style={{color:P.textMuted,fontSize:"13px",marginBottom:"4px"}}>{r.summary}</div><div style={{fontSize:"13px",color:P.accent,fontWeight:600}}>&rarr; {r.parentAction}</div></Card>)}
        <H2>Tone-Calibrated Scripts ({r3.tone})</H2>
        <div style={{background:P.surface,borderRadius:"10px",border:`1px solid ${P.border}`}}>{r3.scripts.map((s,i) => <div key={i} style={{padding:"12px 16px",borderBottom:i<r3.scripts.length-1?`1px solid ${P.border}`:"none"}}><div style={{fontSize:"11px",fontWeight:700,color:P.textMuted,textTransform:"uppercase",marginBottom:"4px"}}>{s.situation}</div><div style={{fontSize:"13px",fontStyle:"italic",lineHeight:1.5}}>"{s.text}"</div></div>)}</div>
        <H2 color={P.accentWarm}>Pushback Scripts</H2>
        <div style={{fontSize:"12px",color:P.textMuted,marginBottom:"10px",marginTop:"-6px"}}>When the school says X &rarr; you say Y</div>
        {r3.pushbacks.map((p,i) => <Card key={i} bg={P.warmLight} border="#F5D0C5"><div style={{fontSize:"12px",fontWeight:700,color:P.accentWarm,marginBottom:"4px"}}>IF: "{p.trigger}"</div><div style={{fontSize:"13px",fontStyle:"italic",lineHeight:1.5}}>&rarr; "{p.response}"</div><div style={{fontSize:"11px",color:P.textMuted,marginTop:"4px"}}>Strategy: {p.category}</div></Card>)}
        {(d3.goal1 || d3.goal2 || d3.goal3) && <><H2>Meeting Goals</H2><Card bg={P.accentLight} border={P.accent}>{d3.goal1 && <div style={{marginBottom:"4px"}}><strong>Primary:</strong> {d3.goal1}</div>}{d3.goal2 && <div style={{marginBottom:"4px"}}><strong>Secondary:</strong> {d3.goal2}</div>}{d3.goal3 && <div><strong>Non-Negotiable:</strong> {d3.goal3}</div>}</Card></>}

        {/* ── CHANGE 2: was go(8), now goes directly to go(7) — email already captured ── */}
        <div style={{marginTop:"32px",textAlign:"center"}}><Btn primary onClick={()=>{
          const opening = `Thank you for meeting today regarding ${d1.childName}.\n\nMy primary concerns are:\n1. ${d1.concern1||"___"}\n2. ${d1.concern2||"___"}\n3. ${d1.concern3||"___"}\n\nI'd like to review present levels and evaluation data first, then confirm goal alignment, then discuss services and accommodations, and leave with clear next steps.${r1&&r1.redFlags.length>0?"\n\nI also need clarification on flagged areas before we finalize decisions.":""}`;
          let agenda = "☐ Present Levels Accuracy\n☐ Evaluation Data Review\n☐ Goals (Baselines + Measurability)\n☐ Service Minutes\n☐ Accommodations / EF Supports\n☐ Documentation of Decisions";
          if (r2&&r2.coverageGaps.length>0) agenda+="\n☐ Evaluation Coverage Gaps";
          if (r2&&r2.minimizationFlags.length>0) agenda+="\n☐ Minimization Risk Discussion";
          if (d3.disputes.includes("Behavior discipline")) agenda+="\n☐ Behavior / Manifestation Review";
          const scriptText = r3.scripts.map(s=>`[${s.situation.toUpperCase()}]\n"${s.text}"`).join("\n\n");
          const email = `Subject: Follow-Up from IEP Meeting for ${d1.childName}\n\nDear Team,\n\nThank you for meeting today${d1.meetingDate?` on ${d1.meetingDate}`:""} regarding ${d1.childName}.\n\nTo summarize my understanding:\n• We agreed to:\n• The team will revise:\n• The school will provide:\n\nIf this differs from your notes, please let me know.\n\nSincerely,\n[Your Name]`;
          setPacketEdits({opening,agenda,scripts:scriptText,email});
          setPacketInit(true);
          go(7);
        }}>Generate Meeting Packet &rarr;</Btn></div>
        <Footer />
      </Wrap>
    </div>
  );

  // ---- Step 8: Email Gate ────────────────────────────────────────────────────
  // ── CHANGES 3a–3h applied here ──
  // Gate is now before Module 3 (step 5), not before Module 4.
  // On success: go(5) [Module 3 intake]
  // Back button: go(4) [Eval Results]
  // Kit source tag: "iep-engine-freemium"
  if (step === 8) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <AppHeader title="Unlock Module 3: Rights & Strategy" subtitle="Free with your email — takes 30 seconds." step={7} onGlossary={() => setGlossaryOpen(true)} />
      <Wrap>
        <div style={{ maxWidth: "440px", margin: "40px auto 0" }}>
          <div style={{ background: P.warmLight, border: "1px solid #F5D0C5", borderRadius: "12px", padding: "24px", marginBottom: "24px", textAlign: "center" }}>
            <div style={{ fontSize: "40px", marginBottom: "12px" }}>⚖️</div>
            <div style={{ fontSize: "18px", fontWeight: 700, color: P.accentWarm, marginBottom: "8px" }}>Free with your email:</div>
            <div style={{ fontSize: "14px", color: P.text, lineHeight: 1.7 }}>
              Module 3: Rights & Leverage &middot; Tone-calibrated scripts<br/>
              Your legal rights mapped to your situation<br/>
              Pushback responses for the meeting<br/>
              <span style={{ fontSize: "12px", color: P.textMuted, marginTop: "6px", display: "block" }}>+ Meeting Packet unlocked after completing Module 3</span>
            </div>
          </div>
          <div style={{ background: P.surface, border: "1px solid " + P.border, borderRadius: "12px", padding: "28px" }}>
            <div style={{ fontSize: "15px", fontWeight: 700, color: P.text, marginBottom: "4px" }}>Unlock Module 3: Rights & Strategy</div>
            <div style={{ fontSize: "13px", color: P.textMuted, marginBottom: "20px", lineHeight: 1.5 }}>Get instant access plus updates on new IEP tools and resources from Neurodivergent Uprising. No spam. Unsubscribe anytime.</div>
            <div style={{ marginBottom: "14px" }}>
              <label style={{ display: "block", fontSize: "13px", fontWeight: 600, color: P.text, marginBottom: "6px" }}>First Name</label>
              <input type="text" value={emailGate.firstName} onChange={e => setEmailGate(g => ({...g, firstName: e.target.value}))} placeholder="Your first name" style={{ width: "100%", padding: "12px 14px", borderRadius: "8px", border: "1.5px solid " + P.border, background: P.bg, fontFamily: FONT, fontSize: "14px", color: P.text, boxSizing: "border-box" }} />
            </div>
            <div style={{ marginBottom: "20px" }}>
              <label style={{ display: "block", fontSize: "13px", fontWeight: 600, color: P.text, marginBottom: "6px" }}>Email Address</label>
              <input type="email" value={emailGate.email} onChange={e => setEmailGate(g => ({...g, email: e.target.value, error: ""}))} placeholder="you@email.com" style={{ width: "100%", padding: "12px 14px", borderRadius: "8px", border: "1.5px solid " + (emailGate.error ? P.high : P.border), background: P.bg, fontFamily: FONT, fontSize: "14px", color: P.text, boxSizing: "border-box" }} />
              {emailGate.error && <div style={{ color: P.high, fontSize: "12px", marginTop: "6px" }}>{emailGate.error}</div>}
            </div>
            <button onClick={async () => {
                if (!emailGate.email || !emailGate.email.includes("@")) { setEmailGate(g => ({...g, error: "Please enter a valid email address."})); return; }
                setEmailGate(g => ({...g, submitting: true, error: ""}));
                try {
                  const resp = await fetch("https://api.convertkit.com/v3/forms/9214289/subscribe", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                      api_key: "5IStEe1bSBePuVK8zOuOkw",
                      email: emailGate.email,
                      first_name: emailGate.firstName,
                      // ── CHANGE 3h: source tag now "iep-engine-freemium" ──
                      // This distinguishes freemium subscribers from paid Squarespace buyers.
                      fields: {
                        source: "iep-engine-freemium",
                        lane: "parent",
                        tool_used: "iep_decision_engine",
                        child_grade: d1.grade || "",
                        meeting_type: d1.meetingType || "",
                        red_flags_count: r1 ? String(r1.redFlags.length) : "0",
                        top_domain: r1 && r1.topDomains[0] ? r1.topDomains[0].label : ""
                      }
                    }),
                  });
                  const data = await resp.json();
                  if (data.error) {
                    setEmailGate(g => ({...g, submitting: false, error: data.message || "Something went wrong. Please try again."}));
                  } else {
                    // ── CHANGE 3f: was go(7), now goes to go(5) [Module 3 intake] ──
                    setEmailGate(g => ({...g, submitting: false, done: true}));
                    go(5);
                  }
                } catch (err) {
                  setEmailGate(g => ({...g, submitting: false, error: "Connection error. Please try again."}));
                }
              }} disabled={emailGate.submitting}
              style={{ width: "100%", padding: "14px", borderRadius: "10px", border: "none", background: emailGate.submitting ? P.border : P.accentWarm, color: emailGate.submitting ? P.textMuted : "#fff", fontSize: "15px", fontWeight: 700, fontFamily: FONT, cursor: emailGate.submitting ? "not-allowed" : "pointer", boxShadow: emailGate.submitting ? "none" : "0 2px 12px rgba(196,85,58,0.25)" }}>
              {emailGate.submitting ? "Unlocking..." : "Unlock Rights & Strategy — Free"}
            </button>
            <div style={{ fontSize: "11px", color: P.textMuted, textAlign: "center", marginTop: "12px", lineHeight: 1.5 }}>No spam. Your data stays with NDU. Unsubscribe anytime.</div>
          </div>
          <div style={{ textAlign: "center", marginTop: "16px" }}>
            {/* ── CHANGE 3g: back button was go(6), now goes to go(4) [Eval Results] ── */}
            <button onClick={() => go(4)} style={{ background: "none", border: "none", color: P.textMuted, fontSize: "13px", fontFamily: FONT, cursor: "pointer", textDecoration: "underline" }}>&larr; Back to Evaluation Results</button>
          </div>
        </div>
        <Footer />
      </Wrap>
    </div>
  );

  // ---- Step 7: Module 4 - Meeting Packet ----
  if (step === 7) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <AppHeader title="Module 4: Meeting Packet" subtitle="Review, edit, and print your complete advocacy packet." step={8} onGlossary={() => setGlossaryOpen(true)} />
      <Wrap>
        <div style={{display:"flex",gap:"10px",justifyContent:"center",margin:"16px 0"}}><Btn onClick={()=>go(6)}>&larr; Back</Btn><Btn primary onClick={()=>window.print()}>Print Meeting Packet</Btn></div>
        <div style={{background:P.warmLight,border:"1px solid #F5D0C5",borderRadius:"10px",padding:"14px 16px",marginBottom:"24px",textAlign:"center"}}>
          <div style={{fontSize:"13px",fontWeight:700,color:P.accentWarm}}>Before You Walk In</div>
          <div style={{fontSize:"14px",color:P.text,marginTop:"6px",lineHeight:1.6}}>1. Slow your exhale longer than your inhale.<br/>2. Stay anchored to data, not emotion.<br/>3. You are confirming access — not requesting permission.</div>
        </div>
        <H2>Opening Statement</H2>
        <textarea value={packetEdits.opening} onChange={e=>setPacketEdits(p=>({...p,opening:e.target.value}))} rows={8} style={{width:"100%",padding:"14px",borderRadius:"10px",border:`1px solid ${P.border}`,fontFamily:FONT,fontSize:"14px",lineHeight:1.6,resize:"vertical",boxSizing:"border-box",color:P.text}} />
        <H2>Meeting Agenda</H2>
        <textarea value={packetEdits.agenda} onChange={e=>setPacketEdits(p=>({...p,agenda:e.target.value}))} rows={8} style={{width:"100%",padding:"14px",borderRadius:"10px",border:`1px solid ${P.border}`,fontFamily:FONT,fontSize:"14px",lineHeight:1.6,resize:"vertical",boxSizing:"border-box",color:P.text}} />
        <H2 color={P.accentWarm}>Advocacy Scripts</H2>
        <textarea value={packetEdits.scripts} onChange={e=>setPacketEdits(p=>({...p,scripts:e.target.value}))} rows={12} style={{width:"100%",padding:"14px",borderRadius:"10px",border:`1px solid ${P.border}`,fontFamily:FONT,fontSize:"14px",lineHeight:1.6,resize:"vertical",boxSizing:"border-box",color:P.text}} />
        <H2>Goal Audit Table</H2>
        <div style={{background:P.surface,borderRadius:"10px",border:`1px solid ${P.border}`,overflow:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:"13px",fontFamily:FONT}}>
            <thead><tr style={{background:P.accentLight}}>
              <th style={{padding:"10px 12px",textAlign:"left",fontWeight:600,borderBottom:`1px solid ${P.border}`}}>Goal Area</th>
              <th style={{padding:"10px 12px",textAlign:"center",fontWeight:600,borderBottom:`1px solid ${P.border}`}}>Baseline?</th>
              <th style={{padding:"10px 12px",textAlign:"center",fontWeight:600,borderBottom:`1px solid ${P.border}`}}>Measurable?</th>
              <th style={{padding:"10px 12px",textAlign:"center",fontWeight:600,borderBottom:`1px solid ${P.border}`}}>Decision</th>
            </tr></thead>
            <tbody>{[1,2,3,4].map(i => <tr key={i} style={{borderBottom:`1px solid ${P.border}`}}>
              <td style={{padding:"12px"}}><div style={{width:"100%",borderBottom:`1px dashed ${P.border}`,minHeight:"18px"}} /></td>
              <td style={{padding:"12px",textAlign:"center"}}>☐ Y ☐ N</td>
              <td style={{padding:"12px",textAlign:"center"}}>☐ Y ☐ N</td>
              <td style={{padding:"12px",textAlign:"center",fontSize:"11px"}}>☐ Accept ☐ Revise ☐ Reject</td>
            </tr>)}</tbody>
          </table>
        </div>
        <H2>Decision Log</H2>
        <div style={{background:P.surface,borderRadius:"10px",border:`1px solid ${P.border}`,padding:"16px"}}>
          <div style={{fontWeight:600,marginBottom:"8px",fontSize:"13px"}}>What was agreed to?</div>
          <div style={{borderBottom:`1px dashed ${P.border}`,minHeight:"24px",marginBottom:"12px"}} />
          <div style={{borderBottom:`1px dashed ${P.border}`,minHeight:"24px",marginBottom:"16px"}} />
          <div style={{fontWeight:600,marginBottom:"8px",fontSize:"13px"}}>What requires revision?</div>
          <div style={{borderBottom:`1px dashed ${P.border}`,minHeight:"24px",marginBottom:"12px"}} />
          <div style={{borderBottom:`1px dashed ${P.border}`,minHeight:"24px",marginBottom:"16px"}} />
          <div style={{fontWeight:600,marginBottom:"8px",fontSize:"13px"}}>Follow-up items:</div>
          <div style={{borderBottom:`1px dashed ${P.border}`,minHeight:"24px",marginBottom:"12px"}} />
          <div style={{fontWeight:600,marginBottom:"8px",fontSize:"13px"}}>Next deadline:</div>
          <div style={{borderBottom:`1px dashed ${P.border}`,minHeight:"24px"}} />
        </div>
        <H2>Follow-Up Email</H2>
        <textarea value={packetEdits.email} onChange={e=>setPacketEdits(p=>({...p,email:e.target.value}))} rows={10} style={{width:"100%",padding:"14px",borderRadius:"10px",border:`1px solid ${P.border}`,fontFamily:FONT,fontSize:"14px",lineHeight:1.6,resize:"vertical",boxSizing:"border-box",color:P.text}} />
        <div style={{ background: `linear-gradient(135deg, ${P.warmLight}, #FFF8F5)`, border: "1.5px solid #F5D0C5", borderRadius: "12px", padding: "22px 22px", marginTop: "32px" }}>
          <div style={{ fontSize: "16px", fontWeight: 700, color: P.accentWarm, marginBottom: "8px" }}>When Things Get Messy</div>
          <p style={{ fontSize: "14px", color: P.text, lineHeight: 1.7, margin: "0 0 10px" }}>This packet gives you a strong foundation. But sometimes meetings don't go as planned — the school pushes back harder than expected, decisions get made without your input, or you leave feeling like nothing changed.</p>
          <p style={{ fontSize: "14px", color: P.text, lineHeight: 1.7, margin: "0 0 16px" }}><strong>Neurodivergent Uprising offers 1:1 parent consults</strong> for IEP strategy, meeting prep, post-meeting recovery, and dispute navigation. We don't replace attorneys — we prepare you so you might not need one.</p>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "10px", alignItems: "center" }}>
            <a href="https://calendly.com/iepspeakup/45" target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", padding: "12px 28px", borderRadius: "8px", background: P.accentWarm, color: "#fff", fontSize: "14px", fontWeight: 700, fontFamily: FONT, textDecoration: "none", boxShadow: "0 2px 10px rgba(196,85,58,0.2)" }}>Book a Consult</a>
            <a href="https://neurodivergentuprising.com" target="_blank" rel="noopener noreferrer" style={{ fontSize: "13px", color: P.accentWarm, fontWeight: 600, fontFamily: FONT, textDecoration: "underline" }}>neurodivergentuprising.com</a>
          </div>
        </div>
        <div style={{marginTop:"32px",textAlign:"center"}}><Btn primary onClick={()=>window.print()}>Print Complete Meeting Packet</Btn></div>
        <Footer />
      </Wrap>
    </div>
  );

  return null;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
